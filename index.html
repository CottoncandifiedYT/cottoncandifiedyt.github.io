<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotton Rune Translator</title>
    <style>
        body {
            background: #fff7c2;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
        }

        h1 {
            font-size: 42px;
            color: #ff7b00;
            margin-bottom: 10px;
        }

        textarea {
            width: 90%;
            max-width: 600px;
            height: 140px;
            padding: 12px;
            font-size: 18px;
            border: 3px solid #ffb300;
            border-radius: 10px;
            outline: none;
            resize: none;
            background: #fffdf2;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            font-size: 20px;
            background: #ffb300;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            color: white;
            font-weight: bold;
        }

        button:hover {
            background: #ff9900;
        }

        #output {
            margin-top: 30px;
            font-size: 28px;
            color: #333;
            padding: 20px;
            background: #fffdf2;
            border: 3px solid #ffb300;
            border-radius: 10px;
            width: 90%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            min-height: 50px;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <h1>Cotton Rune Translator</h1>
    <p>English → Cotton Runes + Cotton Punctuation</p>

    <textarea id="inputText" placeholder="Type here..."></textarea>
    <br>
    <button onclick="translate()">Translate</button>

    <div id="output"></div>

    <script>
        const runes = {
            "a": "ᚨ", "b": "ᛒ", "c": "𐌂", "d": "ᛞ",
            "e": "ᛖ", "f": "ᚠ", "g": "ᚷ", "h": "ᚺ",
            "i": "ᛁ", "j": "ᛃ", "k": "ᚲ", "l": "ᛚ",
            "m": "ᛗ", "n": "ᚾ", "o": "ᛟ", "p": "ᛈ",
            "q": "𐌒", "r": "ᚱ", "s": "ᛋ", "t": "ᛏ",
            "u": "ᚢ", "v": "ᚡ", "w": "ᚹ", "x": "𐌗",
            "y": "ᛦ", "z": "ᛉ"
        };

        const punct = {
            ".": "·",
            ",": "‚",
            "?": "⸮",
            "!": "‼",
            ";": "⸸",
            ":": "⸻",
            "\"": "⟦⟧",
            "(": "⟨",
            ")": "⟩"
        };

        function translate() {
            let text = document.getElementById("inputText").value;

            // Special combos first
            text = text.replace(/!!!/g, "𐌖");
            text = text.replace(/!\?/g, "ᛝ");

            let output = "";

            for (let char of text.toLowerCase()) {
                if (runes[char]) {
                    output += runes[char];
                } else if (punct[char]) {
                    output += punct[char];
                } else {
                    output += char;
                }
            }

            // Replace final period with ⟡
            output = output.replace(/·$/g, "⟡");

            document.getElementById("output").innerText = output;
        }
    </script>

</body>
</html>
